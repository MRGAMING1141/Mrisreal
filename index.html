<!DOCTYPE html>
<html>
<head>
<title>IND WEB HOSTER</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: linear-gradient(135deg,#020617,#0f172a);
    color: #e5e7eb;
}

/* NAV */
nav {
    display: flex;
    justify-content: space-between;
    padding: 18px 25px;
}

nav h2 {
    margin: 0;
    color: #60a5fa;
    font-weight: 600;
}

/* HERO */
.hero {
    text-align: center;
    padding: 70px 20px 40px;
}

.hero h1 {
    font-size: 38px;
    margin: 0;
}

.hero p {
    color: #94a3b8;
    margin-top: 10px;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 14px 22px;
    background: linear-gradient(135deg,#2563eb,#3b82f6);
    color: white;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 500;
    border: none;
}

/* SECTION */
.section {
    padding: 40px 20px;
    max-width: 500px;
    margin: auto;
}

/* CARD */
.card {
    background: rgba(2,6,23,0.8);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px;
    border: 1px solid #1e293b;
    margin-bottom: 20px;
}

/* INPUT */
input {
    width: 100%;
    padding: 13px;
    margin-top: 12px;
    border-radius: 10px;
    border: 1px solid #1e293b;
    background: #020617;
    color: white;
    font-size: 14px;
}

/* DOMAIN PREVIEW */
.domain {
    margin-top: 10px;
    font-size: 13px;
    color: #38bdf8;
    word-break: break-all;
}

/* FLOAT BUTTON */
.float {
    position: fixed;
    bottom: 20px;
    right: 15px;
    background: #E1306C;
    padding: 12px 16px;
    border-radius: 50px;
    color: white;
    text-decoration: none;
    font-size: 14px;
    box-shadow: 0 0 15px rgba(225,48,108,0.6);
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <h2>IND WEB HOSTER</h2>
</nav>

<!-- HERO -->
<div class="hero">
    <h1>Launch Your Website</h1>
    <p>Simple hosting for ₹50/month</p>
    <a href="#start" class="btn">Get Started</a>
</div>

<!-- FORM SECTION -->
<div class="section" id="start">

    <div class="card">
        <h3>Enter Details</h3>

        <input id="name" placeholder="Your Name">
        <input id="site" placeholder="Website Name" oninput="updateDomain()">

        <div class="domain" id="domainPreview">
            https://mrgaming1141.github.io/yourname/
        </div>

        <button class="btn" onclick="showPayment()">Continue</button>
    </div>

    <!-- PAYMENT -->
    <div class="card" id="paymentBox" style="display:none;">
        <h3>Complete Setup</h3>
        <p style="color:#94a3b8;font-size:14px;">
        Click below and message your website name on Instagram.
        </p>

        <!-- FIXED REDIRECT -->
        <a id="instaBtn" href="https://www.instagram.com/MR_GAMING1141/" target="_blank" class="btn">
            Pay & Chat on Instagram
        </a>
    </div>

</div>

<!-- FLOAT CHAT -->
<a href="https://www.instagram.com/MR_GAMING1141/" target="_blank" class="float">
    Chat
</a>

<script>
function updateDomain() {
    let name = document.getElementById("site").value.trim().toLowerCase();

    // clean text
    name = name.replace(/\s+/g, "-").replace(/[^a-z0-9-]/g, "");

    document.getElementById("domainPreview").innerText =
        "https://mrgaming1141.github.io/" + (name || "yourname") + "/";
}

function showPayment() {
    let name = document.getElementById("name").value.trim();
    let site = document.getElementById("site").value.trim();

    if (!name || !site) {
        alert("Please fill all details");
        return;
    }

    document.getElementById("paymentBox").style.display = "block";
}
</script>

</body>
</html>
